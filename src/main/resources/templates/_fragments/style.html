<th:block th:fragment="charte">
    <style>

        /* Fond de page */

        body {
            background-color: #FFFBDC;
        }


        /* Titres */

        h1 {
            color: #FF5900;
        }

        h2 {
            color: #FF5900;
        }


        /* Pour les form */

        /* label */
        .form-label,
        .col-form-label {
            color: #FF5900;
            font-weight: 500;
        }

        /* input, textarea */
        .form-control {
            background-color: #FFFBDC;
            border: 1.5px solid #FFAA6E;
            color: #333;
        }

        /* focus */
        .form-control:focus {
            border-color: #FF5900;
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.25);
            background-color: #FFFBDC;
        }

        /* Liste déroulante */
        .form-select {
            background-color: #FFFBDC;
            border: 1.5px solid #FFAA6E;
            color: #333;
        }

        .form-select:focus {
            border-color: #FF5900;
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.25);
        }

        /* Case à cocher */
        .form-check-input {
            border-color: #FFAA6E;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: #FF5900;
            border-color: #FF5900;
        }

        .form-check-input:focus {
            border-color: #FF5900;
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.25);
        }

        /* Label de la case à cocher */
        .form-check-label {
            color: #FF5900;
            font-weight: 500;
            cursor: pointer;
        }

        /* Texte fixe collé à un input (ex: bouton œil du mot de passe) */
        .input-group-text {
            background-color: #FFFBDC;
            border: 1.5px solid #FFAA6E;
            color: #FF5900;
        }


        /* Boutons */

        /* Bouton principal : action importante (Se connecter, Enregistrer…) */
        .btn-primary {
            background-color: #FF5900;
            border-color: #FF5900;
            color: #fff;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #FF8237;
            border-color: #FF8237;
            color: #fff;
        }

        /* Bouton principal : aussi valable sur les liens <a> déguisés en bouton */
        a.btn-primary,
        a.btn-primary:link,
        a.btn-primary:visited {
            background-color: #FF5900;
            border-color: #FF5900;
            color: #fff !important;
            text-decoration: none;
        }

        a.btn-primary:hover,
        a.btn-primary:focus {
            background-color: #FF8237;
            border-color: #FF8237;
            color: #fff !important;
        }

        /* Bouton secondaire : action neutre (Annuler, Retour…) */
        .btn-secondary {
            background-color: #FFAA6E;
            border-color: #FFAA6E;
            color: #fff;
        }

        .btn-secondary:hover,
        .btn-secondary:focus {
            background-color: #FF8237;
            border-color: #FF8237;
            color: #fff;
        }

        /* Bouton lien (invisible, juste du texte cliquable) */
        .btn-link {
            color: #FF5900;
        }

        .btn-link:hover {
            color: #FF8237;
        }


        /* Card */

        .card {
            background-color: #FFD3A5;
            border: 1.5px solid #FFAA6E;
        }

        /* En-tête d'une card */
        .card-header {
            background-color: #FFAA6E;
            border-bottom: 1.5px solid #FF5900;
            color: #fff;
            font-weight: 600;
        }

        /* Pied d'une card */
        .card-footer {
            background-color: #FFD3A5;
            border-top: 1.5px solid #FFAA6E;
        }


        /* Tableau */

        /* En-tête du tableau */
        .table thead th {
            background-color: #FF5900;
            color: #fff;
            border-color: #FF8237;
        }

        /* Lignes du corps du tableau */
        .table tbody tr:hover {
            background-color: #FFD3A5;
        }

        /* Tableau avec fond rayé */
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255, 170, 110, 0.15);
        }

        /* Bordures du tableau */
        .table-bordered > :not(caption) > * > * {
            border-color: #FFAA6E;
        }


        /* Alertes */

        .alert-primary {
            background-color: #FFD3A5;
            border-color: #FFAA6E;
            color: #FF5900;
        }


        /* Pagination */

        /* Page active (page courante) */
        .page-item.active .page-link {
            background-color: #FF5900;
            border-color: #FF5900;
            color: #fff;
        }

        /* Lien de page normal */
        .page-link {
            color: #FF5900;
            border-color: #FFAA6E;
        }

        .page-link:hover {
            background-color: #FFD3A5;
            border-color: #FFAA6E;
            color: #FF5900;
        }

        /* Page désactivée (flèche grisée) */
        .page-item.disabled .page-link {
            color: #FFAA6E;
            border-color: #FFAA6E;
            background-color: #FFFBDC;
        }


        /* Navbar */

        /* Fond de la barre de navigation */
        .navbar.bg-dark {
            background-color: #FF5900 !important;
        }

        /* Liens de navigation */
        .navbar-dark .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.9);
        }

        .navbar-dark .navbar-nav .nav-link:hover,
        .navbar-dark .navbar-nav .nav-link:focus {
            color: #FFFBDC;
        }

        /* Nom du site (brand) */
        .navbar-dark .navbar-brand {
            color: #fff;
            font-weight: 700;
        }

        .navbar-dark .navbar-brand:hover {
            color: #FFFBDC;
        }

        /* Menu déroulant dans la navbar */
        .navbar-dark .dropdown-menu {
            background-color: #FFFBDC;
            border: 1.5px solid #FFAA6E;
        }

        .navbar-dark .dropdown-menu .dropdown-item {
            color: #FF5900;
        }

        .navbar-dark .dropdown-menu .dropdown-item:hover,
        .navbar-dark .dropdown-menu .dropdown-item:focus {
            background-color: #FFD3A5;
            color: #FF5900;
        }


        /* Fenêtres modales */

        .modal-header {
            background-color: #FF5900;
            color: #fff;
            border-bottom: none;
        }

        .modal-content {
            border: 1.5px solid #FFAA6E;
            background-color: #FFFBDC;
        }

        .modal-footer {
            background-color: #FFD3A5;
            border-top: 1.5px solid #FFAA6E;
        }


        /* Footer */

        footer.bg-secondary {
            background-color: #FF5900 !important;
            color: #fff;
        }

    </style>
</th:block>
