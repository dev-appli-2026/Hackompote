<!--
PALETTE DE COULEURS

#FF5900 Orange vif
#FF8237 Orange clair
#FFAA6E Orange pastel
#FFD3A5 Sable
#FFFBDC Crème
#FFFFFF Blanc
#2C2417 Brun foncé
#6B4C2A Brun moyen
-->

<th:block th:fragment="charte">
    <style>

        /* VARIABLES */

        :root {
            --hk-orange:       #FF5900;
            --hk-orange-hover: #FF8237;
            --hk-orange-soft:  #FFAA6E;
            --hk-sand:         #FFD3A5;
            --hk-cream:        #FFFBDC;
            --hk-text:         #2C2417;
            --hk-text-muted:   #6B4C2A;
        }

        /* FOND DE PAGE */

        body {
            background-color: var(--hk-cream);
            color: var(--hk-text);
        }


        /* TITRES */

        h1 {
            color: var(--hk-orange);
        }

        h2 {
            color: var(--hk-text);
        }

        h3 {
            color: var(--hk-text-muted);
            font-size: 1.1rem;
        }


        /* FORMULAIRES */

        /* Label au-dessus d'un champ */
        .form-label,
        .col-form-label {
            color: var(--hk-orange);
            font-weight: 500;
        }

        /* Champs de saisie : input, textarea */
        .form-control {
            background-color: var(--hk-cream);
            border: 1.5px solid var(--hk-orange-soft);
            color: var(--hk-text);
        }

        /* Champ de saisie au focus (quand on clique dedans) */
        .form-control:focus {
            border-color: var(--hk-orange);
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.2);
            background-color: #fff;
        }

        /* Champ de dépôt de fichier (input type="file") */
        .form-control[type="file"] {
            background-color: var(--hk-cream);
            border: 1.5px solid var(--hk-orange-soft);
            color: var(--hk-text);
            cursor: pointer;
        }

        .form-control[type="file"]:focus {
            border-color: var(--hk-orange);
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.2);
        }

        /* Bouton "Parcourir" intégré au champ fichier */
        .form-control[type="file"]::file-selector-button {
            background-color: var(--hk-orange);
            border: none;
            border-right: 1.5px solid var(--hk-orange-soft);
            color: #fff;
            padding: 0.375rem 0.75rem;
            margin-right: 0.75rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .form-control[type="file"]::file-selector-button:hover {
            background-color: var(--hk-orange-hover);
        }

        /* Liste déroulante <select> */
        .form-select {
            background-color: var(--hk-cream);
            border: 1.5px solid var(--hk-orange-soft);
            color: var(--hk-text);
        }

        .form-select:focus {
            border-color: var(--hk-orange);
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.2);
        }

        /* Case à cocher */
        .form-check-input {
            border-color: var(--hk-orange-soft);
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--hk-orange);
            border-color: var(--hk-orange);
        }

        .form-check-input:focus {
            border-color: var(--hk-orange);
            box-shadow: 0 0 0 0.2rem rgba(255, 89, 0, 0.2);
        }

        /* Label de la case à cocher */
        .form-check-label {
            color: var(--hk-orange);
            font-weight: 500;
            cursor: pointer;
        }

        /* Texte fixe collé à un input (ex: bouton œil du mot de passe) */
        .input-group-text {
            background-color: var(--hk-cream);
            border: 1.5px solid var(--hk-orange-soft);
            color: var(--hk-orange);
        }


        /* BOUTONS */

        /* Bouton principal : action importante (Se connecter, Enregistrer…) */
        .btn-primary {
            background-color: var(--hk-orange);
            border-color: var(--hk-orange);
            color: #fff;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: var(--hk-orange-hover);
            border-color: var(--hk-orange-hover);
            color: #fff;
        }

        /* Bouton principal : aussi valable sur les liens <a> déguisés en bouton */
        a.btn-primary,
        a.btn-primary:link,
        a.btn-primary:visited {
            background-color: var(--hk-orange);
            border-color: var(--hk-orange);
            color: #fff !important;
            text-decoration: none;
        }

        a.btn-primary:hover,
        a.btn-primary:focus {
            background-color: var(--hk-orange-hover);
            border-color: var(--hk-orange-hover);
            color: #fff !important;
        }

        /* Bouton secondaire : action neutre (Annuler, Retour…) */
        .btn-secondary {
            background-color: var(--hk-orange-soft);
            border-color: var(--hk-orange-soft);
            color: #fff;
        }

        .btn-secondary:hover,
        .btn-secondary:focus {
            background-color: var(--hk-orange-hover);
            border-color: var(--hk-orange-hover);
            color: #fff;
        }

        /* Bouton secondaire sur un <a> */
        a.btn-secondary,
        a.btn-secondary:link,
        a.btn-secondary:visited {
            background-color: var(--hk-orange-soft);
            border-color: var(--hk-orange-soft);
            color: #fff !important;
            text-decoration: none;
        }

        a.btn-secondary:hover,
        a.btn-secondary:focus {
            background-color: var(--hk-orange-hover);
            border-color: var(--hk-orange-hover);
            color: #fff !important;
        }

        /* Bouton lien (invisible, juste du texte cliquable) */
        .btn-link {
            color: var(--hk-orange);
        }

        .btn-link:hover {
            color: var(--hk-orange-hover);
        }


        /* CARDS */

        .card {
            background-color: var(--hk-sand);
            border: 1.5px solid var(--hk-orange-soft);
        }

        /* En-tête d'une card (optionnel) */
        .card-header {
            background-color: var(--hk-orange-soft);
            border-bottom: 1.5px solid var(--hk-orange);
            color: #fff;
            font-weight: 600;
        }

        /* Pied d'une card (optionnel) */
        .card-footer {
            background-color: var(--hk-sand);
            border-top: 1.5px solid var(--hk-orange-soft);
        }


        /* TABLEAUX */

        /* En-tête du tableau (ligne <thead>) */
        .table thead th {
            background-color: var(--hk-orange);
            color: #fff;
            border-color: var(--hk-orange-hover);
        }

        /* Lignes du corps du tableau */
        .table tbody tr:hover {
            background-color: var(--hk-sand);
        }

        /* Tableau avec fond rayé */
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: rgba(255, 170, 110, 0.15);
        }

        /* Bordures du tableau */
        .table-bordered > :not(caption) > * > * {
            border-color: var(--hk-orange-soft);
        }


        /* ALERTES */

        .alert-primary {
            background-color: var(--hk-sand);
            border-color: var(--hk-orange-soft);
            color: var(--hk-orange);
        }


        /* PAGINATION */

        /* Page active (page courante) */
        .page-item.active .page-link {
            background-color: var(--hk-orange);
            border-color: var(--hk-orange);
            color: #fff;
        }

        /* Lien de page normal */
        .page-link {
            color: var(--hk-orange);
            border-color: var(--hk-orange-soft);
        }

        .page-link:hover {
            background-color: var(--hk-sand);
            border-color: var(--hk-orange-soft);
            color: var(--hk-orange);
        }

        /* Page désactivée (flèche grisée) */
        .page-item.disabled .page-link {
            color: var(--hk-orange-soft);
            border-color: var(--hk-orange-soft);
            background-color: var(--hk-cream);
        }


        /* NAVBAR */

        /* Fond de la barre de navigation */
        .navbar.bg-dark {
            background-color: var(--hk-orange) !important;
        }

        /* Liens de navigation */
        .navbar-dark .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.9);
        }

        .navbar-dark .navbar-nav .nav-link:hover,
        .navbar-dark .navbar-nav .nav-link:focus {
            color: #fff;
        }

        /* Nom du site (brand) */
        .navbar-dark .navbar-brand {
            color: #fff;
            font-weight: 700;
        }

        .navbar-dark .navbar-brand:hover {
            color: var(--hk-cream);
        }

        /* Menu déroulant dans la navbar */
        .navbar-dark .dropdown-menu {
            background-color: var(--hk-cream);
            border: 1.5px solid var(--hk-orange-soft);
        }

        .navbar-dark .dropdown-menu .dropdown-item {
            color: var(--hk-text);
        }

        .navbar-dark .dropdown-menu .dropdown-item:hover,
        .navbar-dark .dropdown-menu .dropdown-item:focus {
            background-color: var(--hk-sand);
            color: var(--hk-orange);
        }


        /* FENETRES MODALES */

        .modal-header {
            background-color: var(--hk-orange);
            color: #fff;
            border-bottom: none;
        }

        .modal-content {
            border: 1.5px solid var(--hk-orange-soft);
            background-color: var(--hk-cream);
        }

        .modal-footer {
            background-color: var(--hk-sand);
            border-top: 1.5px solid var(--hk-orange-soft);
        }


        /* FOOTER */

        footer.bg-secondary {
            background-color: var(--hk-orange) !important;
            color: #fff;
        }

    </style>
</th:block>
