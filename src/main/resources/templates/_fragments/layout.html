<!DOCTYPE html>
<html lang="fr">

<!-- -->
<!-- Fragment Head -->
<!-- -->

<head th:fragment="head(titre)">
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.png}" />
  <title th:text="(${! #strings.isEmpty(titre)} ?  ${titre} + ' - ' : '' ) + 'Hackathon'">Hackathon</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
  <script th:src="@{/lib/jquery/jquery.min.js}"></script>
</head> <!-- Fin Fragment Head -->


<body>

<!--  -->
<!-- Fragment En-tête de page - Barre de navigation -->
<!--  -->
<header th:fragment="header" class="sticky-top">

  <!-- Barre de navigation (fond transparent, padding sur les côtés) -->
  <nav class="navbar navbar-expand-md navbar-dark mt-2 px-3">
    <div class="container-fluid">

      <!-- ===== BLOC GAUCHE : logo + liens de navigation (fond orange) ===== -->
      <div class="d-flex align-items-center rounded px-3 py-2" style="background-color: var(--hk-orange);">

        <!-- Logo et nom du site -->
        <a class="navbar-brand me-3" th:href="@{/}">
          <picture>
            <source media="(max-width: 768px)" th:srcset="@{/img/logo-hackompote-28.png}">
            <img class="img-fluid" th:src="@{/img/logo-hackompote-40.png}">
          </picture>
          <span style="color: white;">Hackompote</span>
        </a> <!-- Fin Logo et nom du site -->

        <!-- Bouton menu burger (visible en mobile) -->
        <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu1">
          <span class="navbar-toggler-icon"></span>
        </button> <!-- Fin Bouton menu burger -->

        <!-- Section escamotable : liens de navigation -->
        <div class="collapse navbar-collapse" id="menu1">
          <ul class="navbar-nav align-items-center">

            <!-- Liste déroulante Gestion (Admin uniquement) -->
            <li class="nav-item dropdown" sec:authorize="hasRole('Admin')">
              <a href="#" class="nav-link text-white dropdown-toggle" data-bs-toggle="dropdown">Gestion</a>
              <ul class="dropdown-menu">
                <li><a th:href="@{/compte/list}" class="dropdown-item">Comptes</a></li>
              </ul> <!-- Fin menu déroulant Gestion -->
            </li> <!-- Fin Liste déroulante Gestion -->

            <!-- Liens directs -->
            <li class="nav-item">
              <a th:href="@{/}" class="nav-link text-white">Accueil</a>
            </li>
            <li class="nav-item dropdown">
              <a th:href="@{/}" class="nav-link text-white dropdown-toggle" data-bs-toggle="dropdown">Hackathon</a>

              <ul class="dropdown-menu">
                <li><a th:href="@{/evenement}" class="dropdown-item">Liste</a></li>
                <li><a th:href="@{/equipe}" class="dropdown-item">Equipes</a></li>
              </ul>
            </li>

            <li class="nav-item">
              <a th:href="@{/qui-sommes-nous}" class="nav-link text-white">Qui sommes-nous ?</a>
            </li>
            <li class="nav-item">
              <a th:href="@{/mentions-legales}" class="nav-link text-white">Mentions légales</a>
            </li>
            <!-- Fin Liens directs -->

          </ul> <!-- Fin liste des liens -->
        </div> <!-- Fin Section escamotable -->

      </div>
      <!-- ===== FIN BLOC GAUCHE ===== -->

      <!-- ===== BLOC DROITE : boutons connexion / déconnexion (fond orange) ===== -->
      <div class="d-flex align-items-center rounded px-3 py-2" style="background-color: var(--hk-orange);">

        <!-- Anonyme : bouton Se connecter -->
        <span sec:authorize="isAnonymous()">
            <a th:href="@{/connexion}" class="btn btn-sm btn-light fw-bold px-3">
              <i class="bi bi-person-circle me-1"></i>Se connecter
            </a>
          </span> <!-- Fin Anonyme -->

        <!-- Authentifié : nom d'utilisateur + bouton Se déconnecter -->
        <span sec:authorize="isAuthenticated()" class="d-flex align-items-center gap-2">
            <span class="text-white" style="font-size: 0.9rem;">
              <i class="bi bi-person-circle me-1"></i>
              <span sec:authentication="name"></span>
            </span>
            <a th:href="@{/logout?continue}" class="btn btn-sm btn-light fw-bold px-3">
              Se déconnecter
            </a>
          </span> <!-- Fin Authentifié -->

      </div>
      <!-- ===== FIN BLOC DROITE ===== -->

    </div> <!-- Fin container-fluid -->
  </nav> <!-- Fin Barre de navigation -->
</header> <!-- Fin Fragment En-tête de page -->


  <!--  -->
  <!-- Fragment Pied de page -->
  <!--  -->
  <footer th:fragment="footer" class="bg-secondary text-bg-dark py-4 text-center">
    &copy; [[${#dates.format(#dates.createNow(), 'yyyy')}]] • Hackompote
    <br><br>
  </footer> <!-- Fin Fragment Pied de page -->


  <!--  -->
  <!-- Fragment Scripts définis dans le layout -->
  <!--  -->
  <th:block th:fragment="bottom-scripts">
    <script th:src="@{/lib/bootstrap/bootstrap.bundle.min.js}"></script>
    <script>
      (function () {
        var header = document.querySelector('header.sticky-top');
        var lastY = 0;
        window.addEventListener('scroll', function () {
          var y = window.scrollY;
          if (y > lastY && y > header.offsetHeight) {
            header.classList.add('navbar-hidden');
          } else {
            header.classList.remove('navbar-hidden');
          }
          lastY = y;
        }, { passive: true });
      })();
    </script>
  </th:block> <!-- Fin Fragment Scripts définis dans le layout -->

</body>

</html>
